server:
  port: 8080

spring:
  application:
    name: code-review-backend
  # Redis 配置
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 硅基流动配置
siliconflow:
  api-key: "sk-okpdxfwbttwgrmjbjjycpljgsycroeihfreuwaarqldsodfs"
  base-url: "https://api.siliconflow.cn"
  model: "deepseek-ai/DeepSeek-V3.2"
  timeout: 60000

# Docker 执行器配置
docker:
  executor:
    image: java-executor:latest
    container-name: java-executor
    memory-limit: 512m
    cpu-limit: 0.5

# 评审配置
review:
  stream:
    key: "code:submit"        # 任务流
    consumer-group: "code-processor"   # 消费者组
  result:
    stream: "code:result"     # 结果流
    ttl: 86400

# 日志配置
logging:
  level:
    com.codereview: DEBUG
    org.springframework: INFO