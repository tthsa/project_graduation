version: '3.8'

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:15-alpine
    container_name: java-eval-postgres
    environment:
      POSTGRES_DB: java_evaluation
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: patient210037
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-db:/docker-entrypoint-initdb.d
    networks:
      - java-eval-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d java_evaluation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: java-eval-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: patient210037
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - java-eval-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: java-eval-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - java-eval-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==================== 后端服务 ====================
  backend:
    build:
      context: ..
      dockerfile: ./docker/backend/Dockerfile
    container_name: java-eval-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SPRING_DATASOURCE_HOST=postgres
      - SPRING_DATASOURCE_PORT=5432
      - SPRING_DATASOURCE_DB=java_evaluation
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=patient210037
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=patient210037
      - SPRING_REDIS_HOST=redis
      - SILICONFLOW_API_KEY=sk-nykpvatykvuhvszpjbhykdemokruzhilmqcqhreadincphvn
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - java-eval-network
    restart: unless-stopped

  # ==================== Java 沙箱 ====================
  java-sandbox:
    build:
      context: .
      dockerfile: ./java-executor/Dockerfile
    container_name: java-sandbox
    image: java-sandbox:latest
    restart: unless-stopped
    networks:
      - java-eval-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

# ==================== 数据卷 ====================
volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

# ==================== 网络 ====================
networks:
  java-eval-network:
    driver: bridge