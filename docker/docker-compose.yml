services:
  # ==================== Redis消息队列 ====================
  redis:
    image: redis:7-alpine
    container_name: code-review-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - code-review-network

  # ==================== Redis可视化工具 ====================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: code-review-redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - code-review-network

  # ==================== Java执行器基础镜像 ====================
  java-executor-base:
    build:
      context: ./docker/executor
      dockerfile: java-executor/Dockerfile
    image: java-executor:latest
    profiles:
      - build

networks:
  code-review-network:
    driver: bridge

volumes:
  redis-data:
  redisinsight-data:
